---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-notify-slack-on-failure-release-success-with-notify
spec:
  description: |
    Run the notify-slack-on-failure task with a release that
    has succeeded and notifySuccess=true to verify success notification
  tasks:
    - name: run-task
      taskRef:
        name: notify-slack-on-failure
      params:
        - name: secretName
          value: "my-secret"
        - name: secretKeyName
          value: "my-team"
        - name: release
          value: "ns/release-success-with-notify"
        - name: notifySuccess
          value: "true"
        - name: tagSuccess
          value: "true"
        - name: slackHandles
          value: "Usuccess1, Usuccess2"
