---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-validate-fbc-no-images
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Test FBC validation when no related images are found
  tasks:
    - name: run-task
      taskRef:
        name: validate-fbc-images-resolvable
      params:
        - name: fbc-image
          value: "quay.io/test/no-images:latest"
        - name: idms-content
          value: |
            apiVersion: config.openshift.io/v1
            kind: ImageDigestMirrorSet
            metadata:
              name: test-mirror-set
            spec:
              imageDigestMirrors:
                - source: registry.redhat.io/ubi8
                  mirrors:
                    - mirror.example.com/ubi8
        - name: retries
          value: "3"
        - name: retry-interval
          value: "10"
