---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-gar-success
spec:
  description: |
    Run the push-snapshot-to-gar task and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-gar
      params:
        - name: releasePlan
          value: "ns/releasePlan"
        - name: snapshot
          value: "ns/snapshot"
        - name: release
          value: "ns/snapshot-release"
        - name: wifAudience
          value: "test-audience"
