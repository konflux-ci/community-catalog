---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-gar-component-tags
spec:
  description: |
    Run the push-snapshot-to-gar task with componentTags and verify
    that component-level tags are merged with repo-level tags
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-gar
      params:
        - name: releasePlan
          value: "ns/componenttags"
        - name: snapshot
          value: "ns/componenttags"
        - name: release
          value: "ns/componenttags-release"
        - name: wifAudience
          value: "test-audience"
