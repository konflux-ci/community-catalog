---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-gar-no-components
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Run the push-snapshot-to-gar task and check that the task
    fails when there are no components present in the snapshot
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-gar
      params:
        - name: releasePlan
          value: "ns/releasePlan"
        - name: snapshot
          value: "ns/empty"
        - name: release
          value: "ns/empty-release"
        - name: wifAudience
          value: "test-audience"
