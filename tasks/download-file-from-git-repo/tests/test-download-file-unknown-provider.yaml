---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-download-file-unknown-provider
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Test handling of unknown git providers
  tasks:
    - name: run-task
      taskRef:
        name: download-file-from-git-repo
      params:
        - name: url
          value: "https://unknown-provider.com/org/repo"
        - name: revision
          value: "main"
        - name: pathInRepo
          value: "config.yaml"
        - name: REPO_TOKEN
          value: "private-token"
        - name: REPO_KEY
          value: "token" 
