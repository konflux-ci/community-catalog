---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: validate-fbc-images-resolvable
spec:
  description: >-
    Tekton pipeline to validate a File-Based Catalog (FBC) by checking the
    availability of all its related images. It fetches an ImageDigestMirrorSet
    file from the component's source Git repository to resolve mirrors for
    unavailable images.
  params:
    - name: SNAPSHOT
      description: |
        A JSON string of an ApplicationSnapshot resource spec, provided by Konflux.
        It contains component details like the container image and source Git repository.
        A minimal example:
          {
            "components": [
              {
                "containerImage": "quay.io/example/fbc:latest",
                "source": {
                  "git": {
                    "url": "https://github.com/org/repo",
                    "revision": "main"
                  }
                }
              }
            ]
          }
      type: string
    - name: PATH_TO_MIRROR_SET
      description: The path within the source Git repository to the ImageDigestMirrorSet configuration file.
      type: string
      default: ".tekton/images-mirror-set.yaml"
    - name: AUTH_SECRETS
      description: >-
        JSON array of secret name/namespace pairs for registry authentication.
        Must be provided as a valid JSON string.
      type: string
      default: "[]"
    - name: REPO_TOKEN
      description: The name of a Kubernetes Secret containing the access token needed to clone a private Git repository.
      type: string
      default: ""
    - name: REPO_KEY
      description: The key within the REPO_TOKEN secret that holds the access token value.
      type: string
      default: ""
    - name: RETRIES
      description: The maximum number of validation attempts for the validation task.
      type: string
      default: "3"
    - name: RETRY_INTERVAL
      description: The time to wait between retries for the validation task, in seconds.
      type: string
      default: "300"
  tasks:
    - name: parse-metadata
      taskSpec:
        description: Extracts required metadata from the input snapshot.
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: fbc-image
          - name: source-git-url
          - name: source-git-revision
        steps:
          - name: parse
            image: quay.io/konflux-ci/konflux-test:v1.4.26
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              # The SNAPSHOT parameter is not always valid JSON, so we use string manipulation
              # to extract the required fields instead of jq.
              echo "--- Raw SNAPSHOT parameter ---"
              # We need to disable shellcheck for this line because Tekton will substitute the value.
              # We actually want to print the substituted value but shellcheck doesn't know that.
              # shellcheck disable=SC2005
              echo "$(params.SNAPSHOT)"
              echo "----------------------------"

              # Extract values using grep and sed for robustness
              FBC_IMAGE=$(grep -o 'containerImage:[^,}]*' <<< "$(params.SNAPSHOT)" | sed 's/containerImage://')
              SOURCE_URL=$(grep -o 'url:[^,}]*' <<< "$(params.SNAPSHOT)" | sed 's/url://')
              SOURCE_REV=$(grep -o 'revision:[^,}]*' <<< "$(params.SNAPSHOT)" | sed 's/revision://')

              echo -n "$FBC_IMAGE" > "$(results.fbc-image.path)"
              echo -n "$SOURCE_URL" > "$(results.source-git-url.path)"
              echo -n "$SOURCE_REV" > "$(results.source-git-revision.path)"
              
              echo "Parsed FBC Image: $(cat "$(results.fbc-image.path)")"
              echo "Parsed Git URL: $(cat "$(results.source-git-url.path)")"
              echo "Parsed Git Revision: $(cat "$(results.source-git-revision.path)")"
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
    - name: download-idms-file
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/community-catalog.git
          - name: revision
            value: development
          - name: pathInRepo
            value: tasks/download-file-from-git-repo/download-file-from-git-repo.yaml
      params:
        - name: url
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: revision
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: pathInRepo
          value: $(params.PATH_TO_MIRROR_SET)
        - name: REPO_TOKEN
          value: $(params.REPO_TOKEN)
        - name: REPO_KEY
          value: $(params.REPO_KEY)
    - name: combine-dockercfgjson-secrets
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/community-catalog.git
          - name: revision
            value: development
          - name: pathInRepo
            value: tasks/combine-dockercfgjson-secrets/combine-dockercfgjson-secrets.yaml
      params:
        - name: auth-secrets
          value: $(params.AUTH_SECRETS)
    - name: run-fbc-validation
      runAfter: [ "parse-metadata", "download-idms-file", "combine-dockercfgjson-secrets" ]
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: https://github.com/konflux-ci/community-catalog.git
          - name: revision
            value: development
          - name: pathInRepo
            value: tasks/validate-fbc-images-resolvable/validate-fbc-images-resolvable.yaml
      params:
        - name: fbc-image
          value: $(tasks.parse-metadata.results.fbc-image)
        - name: idms-content
          value: $(tasks.download-idms-file.results.content)
        - name: auth-json
          value: $(tasks.combine-dockercfgjson-secrets.results.auth-json)
        - name: retries
          value: $(params.RETRIES)
        - name: retry-interval
          value: $(params.RETRY_INTERVAL)
