---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-validate-fbc-auth-multiple-secrets
spec:
  description: |
    Test FBC validation with multiple authentication secrets
  tasks:
    - name: run-task
      taskRef:
        name: validate-fbc-images-resolvable
      params:
        - name: fbc-image
          value: "quay.io/test/fbc:latest"
        - name: idms-content
          value: |
            apiVersion: config.openshift.io/v1
            kind: ImageDigestMirrorSet
            metadata:
              name: test-mirror-set
            spec:
              imageDigestMirrors:
                - source: registry.example.com/test
                  mirrors:
                    - mirror.example.com/test
                - source: registry.redhat.io/ubi8
                  mirrors:
                    - mirror.redhat.io/ubi8
        - name: auth-json
          value: |
            {
              "auths": {
                "registry.example.com": {
                  "auth": "dGVzdHVzZXIxOnRlc3RwYXNzMQ=="
                },
                "quay.io": {
                  "auth": "dGVzdHVzZXIyOnRlc3RwYXNzMg=="
                },
                "registry.redhat.io": {
                  "auth": "dGVzdHVzZXIzOnRlc3RwYXNzMw=="
                }
              }
            }
        - name: retries
          value: "1"
        - name: retry-interval
          value: "5"
