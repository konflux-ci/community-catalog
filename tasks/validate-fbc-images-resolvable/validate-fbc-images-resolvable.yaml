---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-fbc-images-resolvable
spec:
  description: >-
    This task validates a File-Based Catalog (FBC) image by checking for the
    availability of all its related images. It uses an ImageDigestMirrorSet
    (IDMS) to check for mirrors if a primary image URL is unavailable.
    Includes a configurable retry mechanism and support for multiple registry
    authentication secrets from the Konflux cluster. Requires RBAC permissions
    to read secrets in the specified namespaces.
  params:
    - name: fbc-image
      description: The FBC image pull spec to be validated.
    - name: idms-content
      description: The string content of the ImageDigestMirrorSet YAML file.
    - name: auth-json
      description: >-
        JSON object containing the authentication content to use.
      type: string
      default: '{"auths": {}}'
    - name: retries
      description: The maximum number of validation attempts.
      type: string
      default: "3"
    - name: retry-interval
      description: The time to wait between retries, in seconds.
      type: string
      default: "300"  # 5 minutes
  steps:
    - name: validate
      image: registry.access.redhat.com/ubi9/ubi:latest
      env:
        - name: FBC_IMAGE
          value: "$(params.fbc-image)"
        - name: IDMS_CONTENT
          value: "$(params.idms-content)"
        - name: RETRIES
          value: "$(params.retries)"
        - name: RETRY_INTERVAL
          value: "$(params.retry-interval)"
        - name: AUTH_JSON
          value: "$(params.auth-json)"
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "--- Installing Dependencies ---"
        # Install skopeo and jq from dnf
        dnf install -y skopeo jq

        # Install yq manually as it's not in the default UBI repos
        YQ_VERSION="v4.45.4"
        ARCH=$(uname -m)
        if [[ "$ARCH" == "x86_64" ]]; then
          ARCH="amd64"
        fi
        curl -L \
          "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${ARCH}" \
          -o /usr/local/bin/yq
        chmod +x /usr/local/bin/yq

        # Install opm
        OPM_VERSION="v1.52.0"
        curl -L \
          "https://github.com/operator-framework/operator-registry/releases/download/${OPM_VERSION}/linux-${ARCH}-opm" \
          -o /usr/local/bin/opm
        chmod +x /usr/local/bin/opm

        echo "--- Versions ---"
        opm version
        yq --version
        echo "----------------"

        if [[ -z "$FBC_IMAGE" || "$FBC_IMAGE" == "null" ]]; then
          echo "ERROR: FBC_IMAGE is not set."
          exit 1
        fi

        # Configure authentication from input parameters
        echo "$AUTH_JSON" > /tmp/auth.json
        REGISTRY_AUTH_FILE="/tmp/auth.json"
        AUTH_PARAMS=(--authfile "${REGISTRY_AUTH_FILE}")

        # Helper function to check if error is authentication-related
        is_auth_error() {
          local error_msg="$1"
          if [[ "$error_msg" =~ (authentication|unauthorized|401|403) ]] || \
             [[ "$error_msg" =~ (access.*denied|login.*required|credentials) ]]; then
            return 0
          fi
          return 1
        }

        # Initialize array to track successfully validated images
        declare -a validated_images=()

        # Helper function to check if an image is already validated
        is_already_validated() {
          local image="$1"
          if [[ ${#validated_images[@]} -eq 0 ]]; then
            return 1
          fi
          for validated_image in "${validated_images[@]}"; do
            if [[ "$validated_image" == "$image" ]]; then
              return 0
            fi
          done
          return 1
        }

        # Helper function to mark an image as validated
        mark_as_validated() {
          local image="$1"
          validated_images+=("$image")
          echo "  -> CACHED: Image marked as validated for future attempts"
        }

        attempt=0
        while [[ $attempt -lt "$RETRIES" ]]; do
          attempt=$((attempt+1))
          echo "--- Validation Attempt ${attempt} of ${RETRIES} ---"

          echo "Validating FBC: $FBC_IMAGE"
          echo "================================================="

          related_images=$(opm render "${FBC_IMAGE}" --skip-tls-verify \
            | jq -r 'select(.schema == "olm.bundle") | .relatedImages[].image' \
            | sort -u)

          if [[ -z "$related_images" ]]; then
            echo "ERROR: No related images found in the FBC."
            exit 1
          fi

          validation_failed=false

          # Load the mirror set into shell arrays for robust processing.
          # The yq query now includes `.spec` to correctly parse the IDMS.
          mapfile -t sources < <(echo "$IDMS_CONTENT" | yq e '.spec.imageDigestMirrors[].source' -)
          mapfile -t mirrors < <(echo "$IDMS_CONTENT" | yq e '.spec.imageDigestMirrors[].mirrors[0]' -)

          for image in $related_images; do
            echo "Checking image: $image"

            # Skip images that have already been validated in previous attempts
            if is_already_validated "$image"; then
              echo "  -> SKIPPED: Image already validated in previous attempt"
              continue
            fi

            # Capture stderr to check for authentication errors
            set +e
            timeout 60 skopeo inspect "docker://${image}" --tls-verify=false "${AUTH_PARAMS[@]}" \
              > "/tmp/stdout_${image//[^a-zA-Z0-9]/_}.txt" \
              2> "/tmp/stderr_${image//[^a-zA-Z0-9]/_}.txt"
            skopeo_exit_code=$?
            set -e

            # Debug output
            echo "  -> Skopeo exit code: $skopeo_exit_code"
            echo "  -> Skopeo command: timeout 60 skopeo inspect \"docker://${image}\""
            echo "     --tls-verify=false ${AUTH_PARAMS[*]}"
            if [[ -s "/tmp/stdout_${image//[^a-zA-Z0-9]/_}.txt" ]]; then
              echo "  -> Skopeo stdout: $(cat "/tmp/stdout_${image//[^a-zA-Z0-9]/_}.txt")"
            fi
            if [[ -s "/tmp/stderr_${image//[^a-zA-Z0-9]/_}.txt" ]]; then
              echo "  -> Skopeo stderr: $(cat "/tmp/stderr_${image//[^a-zA-Z0-9]/_}.txt")"
            fi

            if [[ $skopeo_exit_code -eq 0 ]]; then
              echo "  -> SUCCESS: Image is available at primary URL."
              mark_as_validated "$image"
            else
              error_output=""
              if [[ -s "/tmp/stderr_${image//[^a-zA-Z0-9]/_}.txt" ]]; then
                error_output=$(cat "/tmp/stderr_${image//[^a-zA-Z0-9]/_}.txt")
              fi

              if is_auth_error "$error_output"; then
                echo "  -> ERROR: Authentication failure for primary URL"
                echo "  -> Error: $error_output"
                echo "  -> INFO: Checking for a mirror..."
              else
                echo "  -> INFO: Image not available at primary URL. Checking for a mirror..."
              fi

              image_repo=$(echo "$image" | cut -d'@' -f1)
              image_digest=$(echo "$image" | cut -d'@' -f2)

              # Iterate through the mirror sources to find the longest matching prefix
              best_match_source=""
              best_match_mirror=""
              for i in "${!sources[@]}"; do
                source_repo="${sources[$i]}"

                if [[ "$image_repo" == "$source_repo"* ]]; then
                  # This is a potential match. Check if it's longer than the previous best match.
                  if [[ ${#source_repo} -gt ${#best_match_source} ]]; then
                    best_match_source="$source_repo"
                    best_match_mirror="${mirrors[$i]}"
                  fi
                fi
              done

              if [[ -n "$best_match_source" ]]; then
                # A matching mirror prefix was found
                image_suffix=${image_repo#"$best_match_source"}
                resolved_url="${best_match_mirror}${image_suffix}@${image_digest}"

                echo "  -> INFO: Found mirror configuration, testing resolved URL..."
                echo "  -> Source Prefix: ${best_match_source}"
                echo "  -> Mirror Prefix: ${best_match_mirror}"
                echo "  -> Resolved URL:  ${resolved_url}"

                # Check mirror URL with authentication error detection
                set +e
                timeout 60 skopeo inspect "docker://${resolved_url}" \
                  --tls-verify=false "${AUTH_PARAMS[@]}" \
                  > "/tmp/mirror_stdout_${resolved_url//[^a-zA-Z0-9]/_}.txt" \
                  2> "/tmp/mirror_stderr_${resolved_url//[^a-zA-Z0-9]/_}.txt"
                mirror_exit_code=$?
                set -e

                # Debug output for mirror
                echo "  -> Mirror skopeo exit code: $mirror_exit_code"
                echo "  -> Mirror skopeo command: timeout 60 skopeo inspect \"docker://${resolved_url}\""
                echo "     --tls-verify=false ${AUTH_PARAMS[*]}"
                if [[ -s "/tmp/mirror_stdout_${resolved_url//[^a-zA-Z0-9]/_}.txt" ]]; then
                  echo "  -> Mirror skopeo stdout: $(cat "/tmp/mirror_stdout_${resolved_url//[^a-zA-Z0-9]/_}.txt")"
                fi
                if [[ -s "/tmp/mirror_stderr_${resolved_url//[^a-zA-Z0-9]/_}.txt" ]]; then
                  echo "  -> Mirror skopeo stderr: $(cat "/tmp/mirror_stderr_${resolved_url//[^a-zA-Z0-9]/_}.txt")"
                fi

                if [[ $mirror_exit_code -eq 0 ]]; then
                  echo "  -> SUCCESS: Image is available at mirror URL."
                  mark_as_validated "$image"
                else
                  mirror_error_output=""
                  if [[ -s "/tmp/mirror_stderr_${resolved_url//[^a-zA-Z0-9]/_}.txt" ]]; then
                    mirror_error_output=$(cat "/tmp/mirror_stderr_${resolved_url//[^a-zA-Z0-9]/_}.txt")
                  fi

                  if is_auth_error "$mirror_error_output"; then
                    echo "  -> ERROR: Authentication failure for mirror URL"
                    echo "  -> Error: $mirror_error_output"
                  else
                    echo "  -> FAILURE: Image not available at mirror URL either."
                  fi
                  validation_failed=true
                fi
              else
                # No matching prefix was found in the entire mirror set
                echo "  -> FAILURE: No mirror found for source '${image_repo}'"
                validation_failed=true
              fi
            fi
            echo
          done

          echo "================================================="

          # Show validation summary
          total_images=$(echo "$related_images" | wc -w)
          validated_count=${#validated_images[@]}
          remaining_count=$((total_images - validated_count))
          echo "Validation Summary - Total: $total_images, Validated: $validated_count, Remaining: $remaining_count"

          if [[ "$validation_failed" == false ]]; then
            echo "Validation PASSED on attempt ${attempt}."
            exit 0
          fi

          if [[ $attempt -lt "$RETRIES" ]]; then
            echo "Validation FAILED on attempt ${attempt}. Retrying in ${RETRY_INTERVAL} seconds..."
            if [[ $validated_count -gt 0 ]]; then
              echo "Note: $validated_count already validated images will be skipped in the next attempt."
            fi
            sleep "$RETRY_INTERVAL"
          else
            echo "Validation FAILED on final attempt ${attempt}."
          fi
        done

        echo "All ${RETRIES} validation attempts failed."
        exit 1
