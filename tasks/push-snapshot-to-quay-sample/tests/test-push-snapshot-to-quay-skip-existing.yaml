---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-quay-skip-existing
spec:
  description: |
    Run the push-snapshot-to-quay task with source and destination
    images that have the same SHA hash and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-quay-sample
      params:
        - name: releasePlan
          value: "ns/skip-image"
        - name: snapshot
          value: "ns/skip-image"
        - name: release
          value: "ns/skip-image-release"
        - name: requireSuccessfulManagedRelease
          value: "false"
