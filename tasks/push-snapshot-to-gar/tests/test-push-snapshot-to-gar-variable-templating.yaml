---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-gar-variable-templating
spec:
  description: |
    Run the push-snapshot-to-gar task with git_sha and git_short_sha
    tag templates and check that tags are resolved correctly
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-gar
      params:
        - name: releasePlan
          value: "ns/templating"
        - name: snapshot
          value: "ns/templating"
        - name: release
          value: "ns/templating-release"
        - name: wifAudience
          value: "test-audience"
