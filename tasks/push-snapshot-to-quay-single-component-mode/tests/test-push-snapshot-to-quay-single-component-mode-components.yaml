---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-quay-single-component-mode-multiple-components
spec:
  description: |
    Run the push-snapshot-to-quay-single-component-mode task with multiple components
    and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-quay-single-component-mode
      params:
        - name: releasePlan
          value: "ns/multiple"
        - name: snapshot
          value: "ns/multiple"
        - name: release
          value: "ns/multiple-release"
        - name: requireSuccessfulManagedRelease
          value: "false"
