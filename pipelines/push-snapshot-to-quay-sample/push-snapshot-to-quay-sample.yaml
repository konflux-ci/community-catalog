---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: push-snapshot-to-quay-sample
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
spec:
  description: |-
    Tekton task to push snapshot images to quay.io using `cosign copy`. The destination for
    each image is taken from the '.spec.data.mapping' section of the release plan, in the form
    '.spec.data.mapping.components.repository', and '.spec.data.mapping.components.tags'.
    
    If `requireSuccessfulManagedRelease` is "true", the snapshot will only be pushed if it
    contains a status indicating that a managed pipeline has successfully completed.

    ⚠️ Note: This is a sample pipeline that should be kept simple to serve as a good example
    of how to construct a tenant or final pipeline, so any non-bugfix contributions should be moved
    to a new or existing duplicate of this pipeline.
  params:
    - name: releasePlan
      description: Namespaced name of release plan - should be in format "namespace/name"
      type: string
    - name: snapshot
      description: Namespaced name of snapshot - should be in format "namespace/name"
      type: string
    - name: taskGitUrl
      type: string
      description: The url to the git repo where the community-catalog tasks to be used are stored
      default: https://github.com/konflux-ci/community-catalog.git
    - name: taskGitRevision
      type: string
      description: The revision in the taskGitUrl repo to be used
    - name: release
      description: Namespaced name of release - should be in format "namespace/name"
      type: string
    - name: requireSuccessfulManagedRelease
      description: Only push if the managed release status is successful
      type: string
      default: "false"
    - name: skipAttestations
      description: If true, skip copying attestations and signatures
      type: string
      default: "false"
  tasks:
    - name: push-snapshot-to-quay-sample
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: tasks/push-snapshot-to-quay-sample/push-snapshot-to-quay-sample.yaml
      params:
        - name: snapshot
          value: $(params.snapshot)
        - name: releasePlan
          value: $(params.releasePlan)
        - name: release
          value: $(params.release)
        - name: requireSuccessfulManagedRelease
          value: $(params.requireSuccessfulManagedRelease)
        - name: skipAttestations
          value: $(params.skipAttestations)
