---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-quay-multiple-components
spec:
  description: |
    Run the push-snapshot-to-quay task with multiple components
    and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-quay
      params:
        - name: releasePlan
          value: "ns/multiple"
        - name: snapshot
          value: "ns/multiple"
