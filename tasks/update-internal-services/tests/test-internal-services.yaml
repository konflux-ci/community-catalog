---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-internal-services
spec:
  description: |
    Run the update-internal-services task. It doesn't use a workspace, so there isn't a way to
    ensure the changes were made, but we can still check that the task succeeds.
  tasks:
    - name: run-task
      taskRef:
        name: update-internal-services
      params:
        - name: deployment
          value: staging
        - name: repoUrl
          value: github.com/org/repo
        - name: githubSecret
          value: update-internal-services-secret
        - name: image
          value: quay.io/konflux-ci/internal-services:12345678
