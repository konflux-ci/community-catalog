---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-quay-single-component-mode-single-component-mode
spec:
  description: |
    Run the push-snapshot-to-quay-single-component-mode task with single component mode
    and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-quay-single-component-mode
      params:
        - name: releasePlan
          value: "ns/multiple"
        - name: snapshot
          value: "ns/single-component-mode"
        - name: release
          value: "ns/success"
        - name: requireSuccessfulManagedRelease
          value: "false"
        - name: singleComponent
          value: "true"
