---
name: Promote branch
on:
  workflow_dispatch:
    inputs:
      promotion-type:
        description: The type of promotion to perform
        type: choice
        required: true
        default: development-to-staging
        options:
          - development-to-staging
          - staging-to-production
      force-to-staging:
        description: |
          Force to staging: Allow promotion to staging even if staging and production differ
        type: boolean
        required: true
        default: false
      override:
        description: |
          Override: Allow promotion to production even if the change has not been in staging for one
          week
        type: boolean
        required: true
        default: false
      dry-run:
        description: |
          Dry run: Print out the changes that would be promoted but do not perform the git push
        type: boolean
        required: true
        default: false
  # All production promotions must be manually reviewed and approved.
  # schedule:
  #   # UTC time
  #   - cron: "15 14 * * 3"
permissions:
  contents: write
  actions: write
jobs:
  promote-staging-to-production:
    name: Promote Staging to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Promote Branch - ${{ inputs.promotion-type || 'Staging-to-Production' }}
        run: |
          .github/scripts/promote_branch.sh --promotion-type $PROMOTION_TYPE --force-to-staging $FORCE \
            --override $OVERRIDE --dry-run $DRY
        env:
          PROMOTION_TYPE: ${{ inputs.promotion-type || 'staging-to-production' }}
          FORCE: ${{ !contains(inputs.force-to-staging, 'false') }}
          OVERRIDE: ${{ !contains(inputs.override, 'false') }}
          DRY: ${{ inputs.dry-run || false }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  promote-development-to-staging:
    name: Promote Development to Staging
    runs-on: ubuntu-latest
    if: inputs.promotion-type == ''
    needs: promote-staging-to-production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Promote Branch - Development-to-Staging
        run: |
          .github/scripts/promote_branch.sh --promotion-type $PROMOTION_TYPE --force-to-staging $FORCE \
            --override $OVERRIDE --dry-run $DRY
        env:
          PROMOTION_TYPE: development-to-staging
          FORCE: ${{ !contains(inputs.force-to-staging, 'false') }}
          OVERRIDE: ${{ !contains(inputs.override, 'false') }}
          DRY: ${{ inputs.dry-run || false }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
