---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-update-manager-fail-invalid-deployment
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Run the update-manager-image-in-git with an invalid `deployment` param and ensure the task fails.
  tasks:
    - name: run-task
      taskRef:
        name: update-manager-image-in-git
      params:
        - name: deployment
          value: other
        - name: repoUrl
          value: github.com/org/repo
        - name: githubSecret
          value: update-manager-secret
        - name: image
          value: quay.io/konflux-ci/internal-services:12345678
