---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-snapshot-to-quay-single-component-mode-release-failed
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Run the push-snapshot-to-quay-single-component-mode task with a release param that
    refers to a failed release. The task should fail.
  tasks:
    - name: run-task
      taskRef:
        name: push-snapshot-to-quay-single-component-mode
      params:
        - name: releasePlan
          value: "ns/releasePlan"
        - name: snapshot
          value: "ns/snapshot"
        - name: release
          value: "ns/fail"
        - name: requireSuccessfulManagedRelease
          value: "true"
