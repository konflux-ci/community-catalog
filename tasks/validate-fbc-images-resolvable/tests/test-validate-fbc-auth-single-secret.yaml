---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-validate-fbc-auth-single-secret
spec:
  description: |
    Test FBC validation with a single authentication secret
  tasks:
    - name: run-task
      taskRef:
        name: validate-fbc-images-resolvable
      params:
        - name: fbc-image
          value: "quay.io/test/fbc:latest"
        - name: idms-content
          value: |
            apiVersion: config.openshift.io/v1
            kind: ImageDigestMirrorSet
            metadata:
              name: test-mirror-set
            spec:
              imageDigestMirrors:
                - source: registry.example.com/test
                  mirrors:
                    - mirror.example.com/test
        - name: auth-secrets
          value: |
            - name: test-registry-secret
              namespace: default
        - name: retries
          value: "1"
        - name: retry-interval
          value: "5"
