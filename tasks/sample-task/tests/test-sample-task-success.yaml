---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-sample-task-success
spec:
  description: |
    Run the sample-task task and check that the task succeeds
  tasks:
    - name: run-task
      taskRef:
        name: sample-task
      params:
        - name: releasePlan
          value: "ns/releasePlan"
        - name: snapshot
          value: "ns/snapshot"
        - name: release
          value: "ns/snapshot-release"