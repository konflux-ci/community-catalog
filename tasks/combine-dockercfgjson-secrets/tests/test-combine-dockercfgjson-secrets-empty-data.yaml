---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-combine-dockercfgjson-secrets-empty-data
spec:
  description: |
    Test combination with empty secret data (should handle gracefully)
  tasks:
    - name: run-task
      taskRef:
        name: combine-dockercfgjson-secrets
      params:
        - name: auth-secrets
          value: |
            [
              {
                "name": "test-registry-secret",
                "namespace": "default"
              },
              {
                "name": "empty-secret",
                "namespace": "default"
              }
            ] 