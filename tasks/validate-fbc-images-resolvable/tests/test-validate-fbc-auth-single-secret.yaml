---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-validate-fbc-auth-single-secret
spec:
  description: |
    Test FBC validation with a single authentication secret
  tasks:
    - name: run-task
      taskRef:
        name: validate-fbc-images-resolvable
      params:
        - name: fbc-image
          value: "quay.io/test/fbc:latest"
        - name: idms-content
          value: |
            apiVersion: config.openshift.io/v1
            kind: ImageDigestMirrorSet
            metadata:
              name: test-mirror-set
            spec:
              imageDigestMirrors:
                - source: registry.redhat.io/ubi8
                  mirrors:
                    - mirror.example.com/ubi8
                - source: registry.redhat.io/ubi9
                  mirrors:
                    - mirror.example.com/ubi9
        - name: auth-json
          value: |
            {
              "auths": {
                "registry.example.com": {
                  "auth": "dGVzdHVzZXI6dGVzdHBhc3M="
                }
              }
            }
        - name: retries
          value: "1"
        - name: retry-interval
          value: "5"
