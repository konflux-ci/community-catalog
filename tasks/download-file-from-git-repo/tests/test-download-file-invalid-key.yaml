---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-download-file-invalid-key
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Test handling of invalid secret keys
  tasks:
    - name: run-task
      taskRef:
        name: download-file-from-git-repo
      params:
        - name: url
          value: "https://github.com/org/private-repo"
        - name: revision
          value: "main"
        - name: pathInRepo
          value: "config.yaml"
        - name: REPO_TOKEN
          value: "invalid-secret"
        - name: REPO_KEY
          value: "token" 
